name: Release

# Tag-triggered multi-platform release. Push a tag like `v1.0.1` (matching the
# version in tauri.conf.json) and this builds signed installers for Windows,
# macOS, and Linux, uploads them to a GitHub Release, and generates the
# `latest.json` manifest the in-app updater points at.
#
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   TAURI_PRIVATE_KEY   — contents of the updater private key (tauri signer generate)
#   TAURI_KEY_PASSWORD  — the password chosen for that key
# See RELEASING.md for the full flow.

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: macos-latest
          # Tauri v1 needs webkit2gtk-4.0, removed in Ubuntu 24.04 — pin 22.04.
          - platform: ubuntu-22.04
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            libssl-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend deps
        run: npm --prefix web ci

      # tauri-action runs `beforeBuildCommand` (npm run build) to produce web/dist,
      # builds the bundles, signs the updater artifacts with the secrets, uploads
      # them to a (draft) GitHub Release, and emits latest.json.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Clavis ${{ github.ref_name }}'
          releaseBody: 'Download an installer below. Installed apps update in-app via Check for Updates.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
